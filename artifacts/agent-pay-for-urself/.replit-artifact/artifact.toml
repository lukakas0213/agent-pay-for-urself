kind = "web"
previewPath = "/"
title = "agent-pay-for-urself"
version = "1.0.0"
id = "artifacts/agent-pay-for-urself"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23827

[services.development]
run = "pnpm --filter @workspace/agent-pay-for-urself run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/agent-pay-for-urself", "run", "build" ]
publicDir = "artifacts/agent-pay-for-urself/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23827"
BASE_PATH = "/"
